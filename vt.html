<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DevCoderz | Education Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root { --bg: #030712; --card: #111827; --primary: #6366f1; --border: #1f2937; --text: #f9fafb; --dim: #9ca3af; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header { height: 70px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
.logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); cursor: pointer; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; }
.card:hover { border-color: var(--primary); transform: translateY(-3px); }
.icon { width: 45px; height: 45px; background: rgba(99, 102, 241, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.player-mode { display: none; position: fixed; inset: 0; background: #000; z-index: 100; flex-direction: column; }
.player-mode.active { display: flex; }
video { width: 100%; height: 80vh; background: #000; }
.p-head { padding: 20px; display: flex; align-items: center; gap: 20px; background: #111; }
.btn { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo" onclick="showHome()">DEVCODERZ</div>
        <div id="nav-info" style="font-size: 0.8rem; color: var(--dim);">Main Menu</div>
    </header>

    <div id="home-view">
        <h2 style="margin-bottom: 20px;">Study Materials</h2>
        <div class="grid" id="folder-list"></div>
    </div>

    <div id="video-view" class="hidden">
        <h2 id="folder-title" style="margin-bottom: 20px;"></h2>
        <div class="grid" id="lecture-list"></div>
    </div>
</div>

<div class="player-mode" id="player">
    <div class="p-head">
        <button class="btn" onclick="closePlayer()">CLOSE PLAYER</button>
        <div id="now-playing"></div>
    </div>
    <video id="vid" controls></video>
</div>

<script>
// YAHAN APNA DATA DAALO (Isse automatic update honge buttons)
const data = {
    "Physics": [
        { title: "Introduction to Units", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
        { title: "Kinematics L1", url: "YOUR_M3U8_LINK_HERE" }
    ],
    "Mathematics": [
        { title: "Set Theory Basics", url: "YOUR_M3U8_LINK_HERE" }
    ],
    "Chemistry": [
        { title: "Atomic Structure", url: "YOUR_M3U8_LINK_HERE" }
    ]
};

const homeView = document.getElementById('home-view');
const videoView = document.getElementById('video-view');
const folderList = document.getElementById('folder-list');
const lectureList = document.getElementById('lecture-list');
const player = document.getElementById('player');
const vid = document.getElementById('vid');
let hls = null;

function showHome() {
    homeView.classList.remove('hidden');
    videoView.classList.add('hidden');
    document.getElementById('nav-info').innerText = "Main Menu";
    renderFolders();
}

function renderFolders() {
    folderList.innerHTML = '';
    Object.keys(data).forEach(folder => {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => openFolder(folder);
        div.innerHTML = `<div class="icon">📁</div><div><strong>${folder}</strong><br><small style="color:var(--dim)">${data[folder].length} Lectures</small></div>`;
        folderList.appendChild(div);
    });
}

function openFolder(name) {
    homeView.classList.add('hidden');
    videoView.classList.remove('hidden');
    document.getElementById('folder-title').innerText = name;
    document.getElementById('nav-info').innerText = "Home > " + name;
    
    lectureList.innerHTML = '';
    data[name].forEach(lec => {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => startPlay(lec.title, lec.url);
        div.innerHTML = `<div class="icon">▶</div><div><strong>${lec.title}</strong></div>`;
        lectureList.appendChild(div);
    });
}

function startPlay(title, url) {
    player.classList.add('active');
    document.getElementById('now-playing').innerText = title;
    if (Hls.isSupported()) {
        if(hls) hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(vid);
        hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
    }
}

function closePlayer() {
    player.classList.remove('active');
    vid.pause();
    if(hls) hls.destroy();
}

renderFolders();
</script>
</body>
</html>
