*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html{scroll-behavior:smooth}

.nmark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:.85rem;box-shadow:0 0 20px rgba(124,111,255,.45)}

.npill{font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);border:1px solid var(--b1);padding:5px 13px;border-radius:20px;background:var(--s1)}
.bc{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:10px 28px;font-size:.74rem;color:var(--t3);border-bottom:1px solid var(--b1);background:var(--bg1)}
.bc a{text-decoration:none;color:var(--t3);transition:color .15s}.bc a:hover{color:var(--acc3)}

.bndots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(124,111,255,.15) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse 90% 100% at 50% 50%,black 20%,transparent 75%)}
.bnin{position:relative;z-index:1}
.bney{display:inline-flex;align-items:center;gap:8px;font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--acc2);margin-bottom:16px;background:rgba(124,111,255,.08);border:1px solid rgba(124,111,255,.2);padding:5px 14px;border-radius:20px}
.bney::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:gl 2s ease-in-out infinite}
@keyframes gl{0%,100%{opacity:1}50%{opacity:.25}}
.bnh1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.0;letter-spacing:-.035em;color:var(--t1);margin-bottom:14px}

.bnmeta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px}
.bst{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;color:var(--t2);background:var(--s1);border:1px solid var(--b1);padding:6px 14px;border-radius:8px}
.body{padding:32px 28px 100px;max-width:1700px}
.sec{margin-bottom:48px}
.sechd{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.secln{flex:1;height:1px;background:linear-gradient(90deg,var(--b2) 0%,transparent 100%);margin-left:6px}

.lf{color:var(--ylw);background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.18)}
.lv{color:var(--acc2);background:rgba(124,111,255,.08);border:1px solid rgba(124,111,255,.22)}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:10px}
.fc{display:flex;align-items:center;gap:13px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:15px 17px;text-decoration:none;color:inherit;transition:all .2s;position:relative;overflow:hidden}
.fc:hover{border-color:var(--b2);background:var(--s2);transform:translateX(6px);box-shadow:6px 0 24px rgba(124,111,255,.1)}
.fci{width:42px;height:42px;border-radius:11px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.18);display:flex;align-items:center;justify-content:center;font-size:1.15rem}
.fcb{flex:1;min-width:0}.fcn{font-size:.86rem;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:20px}
.vc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.vc:hover{border-color:rgba(124,111,255,.4);transform:translateY(-7px)}
.vt{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000}
.vo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);opacity:0;transition:opacity .28s}.vc:hover .vo{opacity:1}
.vplay{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 36px rgba(124,111,255,.7)}
.vb{padding:14px 15px 16px}.vtt{font-size:.87rem;font-weight:600;color:var(--t1)}
.ov{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column}.ov.on{display:flex}
.pscreen{position:relative;flex:1;background:#000}.pscreen video{width:100%;height:100%;object-fit:contain}
.pload{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:10}.pload.gone{opacity:0;pointer-events:none}
.ring{width:44px;height:44px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--acc2);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.cov{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent,rgba(0,0,0,0.8));opacity:0;transition:opacity .28s;pointer-events:none}.cov.vis{opacity:1;pointer-events:all}
.cov-top,.cov-bot{padding:14px 18px;display:flex;align-items:center}
.cbk{background:none;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:600}
@media(max-width:600px){.nav{padding:0 16px}.banner{padding:32px 16px}}

<script>
