<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderz — Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05050a;
            --acc: #7c6fff;
            --t1: #eeeeff;
            --b1: #202038;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--t1);
            font-family: 'Sora', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation Bar */
        .nav {
            height: 65px;
            background: rgba(5, 5, 10, 0.95);
            border-bottom: 1px solid var(--b1);
            display: flex;
            align-items: center;
            padding: 0 25px;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .logo span {
            background: var(--acc);
            color: #fff;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        /* Iframe Area - Poori bachi hui jagah lega */
        .portal-container {
            flex-grow: 1;
            width: 100%;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="logo"><span>DEV</span> CODERZ</div>
    </nav>

    <div class="portal-container">
        <iframe 
            src="https://vt.rolexcoderz.in/index.php?rcz_tok=60fa9ff3fa1e8df5" 
            title="DevCoderz Portal"
            allow="autoplay; fullscreen" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
