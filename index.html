<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Premium Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-primary); overflow: hidden; height: 100vh; }

        /* Header */
        .header {
            height: 60px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
            position: relative;
        }

        .brand-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(45deg, #a78bfa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Timer Styling - Fixed (No more black box) */
        .live-timer {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            background: rgba(139, 92, 246, 0.1); /* Subtle purple tint */
        }

        /* Container jo footer ko kaat dega */
        .main-container {
            width: 100%;
            height: calc(100vh - 60px);
            overflow: hidden;
            position: relative;
            background: #fff;
        }

        iframe {
            width: 100%;
            border: none;
            margin-top: -68px; /* Header Hide */
            height: calc(100% + 500px); /* Push original footer way down */
            display: block;
        }

        /* Footer Mask */
        .footer-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid var(--accent);
            z-index: 999;
        }

        .footer-text { font-size: 13px; color: #cbd5e1; font-weight: 600; }
        .footer-text b { color: var(--accent); }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -320px;
            width: 280px;
            height: 100%;
            background: var(--bg-secondary);
            transition: 0.3s;
            z-index: 2000;
            padding: 20px;
        }
        .sidebar.active { left: 0; }

        .nav-item {
            padding: 12px;
            background: var(--bg-primary);
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom:20px; color:var(--accent);">DevCoderZ Portal</h3>
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh Page</div>
        <div class="nav-item" onclick="toggleSidebar()"><i class="fas fa-times"></i> Close</div>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-bars" style="color:var(--accent); cursor:pointer;" onclick="toggleSidebar()"></i>
            <span class="brand-text">DevCoderZ</span>
        </div>
        <div class="live-timer" id="clock">00:00:00</div>
    </header>

    <main class="main-container">
        <iframe src="https://eduvibe-nt.pages.dev/" id="mainFrame"></iframe>

        <div class="footer-mask">
            <div class="footer-text">© 2026 Powered by <b>DevCoderZ</b></div>
        </div>
    </main>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
