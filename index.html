<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Study Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #8b5cf6;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-primary); overflow: hidden; height: 100vh; }

        /* Header */
        .header {
            height: 60px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
            position: relative;
        }

        .brand-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(45deg, #a78bfa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Pure White Timer (No Box) */
        .live-timer {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 0.5px;
        }

        /* Main Container for Clipping */
        .main-container {
            width: 100%;
            height: calc(100vh - 60px);
            overflow: hidden;
            position: relative;
            background: #fff;
        }

        iframe {
            width: 100%;
            border: none;
            margin-top: -68px; /* Top Header Hide */
            height: calc(100% + 500px); /* Bottom Footer Push */
            display: block;
        }

        /* Bottom DevCoderZ Overlay */
        .footer-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid var(--accent);
            z-index: 999;
        }

        .footer-text { font-size: 13px; color: #cbd5e1; font-weight: 600; }
        .footer-text b { color: var(--accent); }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -320px;
            width: 280px;
            height: 100%;
            background: var(--bg-secondary);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 20px;
        }
        .sidebar.active { left: 0; }

        .nav-item {
            padding: 12px;
            background: var(--bg-primary);
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom:20px; color:var(--accent);">DevCoderZ Portal</h3>
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh Page</div>
        <div class="nav-item" onclick="toggleSidebar()"><i class="fas fa-times"></i> Close Menu</div>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-bars" style="color:var(--accent); cursor:pointer; font-size: 20px;" onclick="toggleSidebar()"></i>
            <span class="brand-text">DevCoderZ</span>
        </div>
        <div class="live-timer" id="clock">00:00:00</div>
    </header>

    <main class="main-container">
        <iframe src="https://eduvibe-nt.pages.dev/" id="mainFrame"></iframe>

        <div class="footer-mask">
            <div class="footer-text">© 2026 Developed by <b>DevCoderZ</b></div>
        </div>
    </main>

    <script>
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
        }

        setInterval(() => {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 should be 12
            minutes = minutes < 10 ? '0'+minutes : minutes;
            seconds = seconds < 10 ? '0'+seconds : seconds;
            
            document.getElementById('clock').innerText = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
        }, 1000);
    </script>
</body>
</html>
