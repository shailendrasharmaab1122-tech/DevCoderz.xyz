<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Premium Study Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #8b5cf6;
            --accent-secondary: #10b981;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }

        /* Header Styling */
        .header {
            height: 65px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent-primary);
            position: relative;
            z-index: 1000;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .brand-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(45deg, #a78bfa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .menu-btn { font-size: 20px; cursor: pointer; color: var(--accent-primary); transition: 0.3s; }
        .menu-btn:hover { transform: scale(1.1); }

        /* Sidebar Styling */
        .sidebar {
            position: fixed;
            left: -320px;
            width: 300px;
            height: 100%;
            background: var(--bg-secondary);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 30px 20px;
            box-shadow: 10px 0 30px var(--shadow);
        }

        .sidebar.active { left: 0; }

        .nav-item {
            padding: 15px;
            background: var(--bg-primary);
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }

        .nav-item:hover { 
            border-color: var(--accent-primary);
            background: #1e293b;
        }

        .nav-item i { color: var(--accent-primary); }

        /* Main Viewport Clipping Logic */
        .main-container {
            width: 100%;
            height: calc(100vh - 65px);
            overflow: hidden; /* Important: Ye extra content kaat dega */
            position: relative;
            background: #fff;
        }

        iframe {
            width: 100%;
            border: none;
            /* Header Hide: Top margin negative */
            margin-top: -68px; 
            /* Footer Hide: Height itni ki bottom content container ke bahar nikal jaye */
            height: calc(100% + 140px); 
            background: white;
        }

        /* DevCoderZ Footer Overlay (Original Credits Chhupane Ke Liye) */
        .footer-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid var(--accent-primary);
            z-index: 10;
        }

        .footer-text { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .footer-text b { color: var(--accent-primary); }

        .live-clock {
            font-family: monospace;
            background: var(--bg-primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid var(--accent-primary);
        }

    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="font-size: 20px;">Study Portal</h2>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; color: var(--accent-danger);"></i>
        </div>

        <div class="nav-item" onclick="loadBatch('https://eduvibe-nt.vercel.app')">
            <i class="fas fa-graduation-cap"></i> 
            <span>Main Study Batch</span>
        </div>

        <div class="nav-item" onclick="window.open('https://t.me/DevCoderz', '_blank')">
            <i class="fab fa-telegram"></i> 
            <span>Join Telegram</span>
        </div>

        <div style="position: absolute; bottom: 100px; left: 20px;">
            <p style="font-size: 11px; color: var(--text-secondary);">User ID: Student_2026</p>
            <p style="font-size: 11px; color: var(--text-secondary);">System: <b>DevCoderZ Engine</b></p>
        </div>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
            <span class="brand-text">DevCoderZ</span>
        </div>
        <div class="live-clock" id="clock">00:00:00</div>
    </header>

    <main class="main-container">
        <iframe src="https://eduvibe-nt.vercel.app" id="mainFrame"></iframe>

        <div class="footer-overlay">
            <div class="footer-text">Developed & Maintained by <b>DevCoderZ</b></div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function loadBatch(url) {
            document.getElementById('mainFrame').src = url;
            toggleSidebar();
        }

        // Live Clock logic
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
