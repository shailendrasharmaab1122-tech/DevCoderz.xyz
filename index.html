<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Study Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #8b5cf6;
            --white: #ffffff;
            --tg-blue: #24A1DE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-primary); overflow: hidden; height: 100vh; }

        /* Header */
        .header {
            height: 60px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
            position: relative;
        }

        .brand-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(45deg, #a78bfa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-timer {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--white);
        }

        /* Container & Iframe Logic */
        .main-container {
            width: 100%;
            height: calc(100vh - 60px);
            overflow: hidden;
            position: relative;
            background: #fff;
        }

        iframe {
            width: 100%;
            border: none;
            margin-top: -68px; /* Header Hide */
            height: calc(100% + 500px); /* Footer Push */
            display: block;
        }

        /* Bottom DevCoderZ Overlay */
        .footer-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid var(--accent);
            z-index: 999;
        }

        .footer-text { font-size: 13px; color: #cbd5e1; font-weight: 600; }
        .footer-text b { color: var(--accent); }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -320px;
            width: 280px;
            height: 100%;
            background: var(--bg-secondary);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }

        .nav-item {
            padding: 14px;
            background: var(--bg-primary);
            margin-bottom: 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .nav-item:hover { border-color: var(--accent); background: #1e293b; }
        
        .tg-btn { border-color: var(--tg-blue) !important; color: var(--tg-blue) !important; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom:25px; color:var(--accent);">DevCoderZ Portal</h3>
        
        <div class="nav-item" onclick="location.reload()">
            <i class="fas fa-sync-alt"></i> <span>Refresh Portal</span>
        </div>

        <a href="https://t.me/+8tZSJ5FyTXVjM2M1" target="_blank" class="nav-item tg-btn">
            <i class="fab fa-telegram-plane"></i> <span>Join Telegram</span>
        </a>

        <div class="nav-item" onclick="toggleSidebar()" style="margin-top: 20px; background: rgba(239, 68, 68, 0.1); color: #ef4444;">
            <i class="fas fa-times"></i> <span>Close Menu</span>
        </div>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-bars" style="color:var(--accent); cursor:pointer; font-size: 20px;" onclick="toggleSidebar()"></i>
            <span class="brand-text">DevCoderZ</span>
        </div>
        <div class="live-timer" id="clock">00:00:00</div>
    </header>

    <main class="main-container">
        <iframe src="https://eduvibe-nt.pages.dev/" id="mainFrame"></iframe>

        <div class="footer-mask">
            <div class="footer-text">© 2026 Developed by <b>DevCoderZ</b></div>
        </div>
    </main>

    <script>
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
        }

        setInterval(() => {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0'+m : m;
            s = s < 10 ? '0'+s : s;
            document.getElementById('clock').innerText = `${h}:${m}:${s} ${ampm}`;
        }, 1000);
    </script>
</body>
</html>
