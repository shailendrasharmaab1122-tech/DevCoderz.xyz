<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ - Your Study Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --accent-primary: #8b5cf6; /* Purple Theme */
            --accent-secondary: #10b981;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg-primary); color: var(--text-primary); overflow: hidden; height: 100vh; }

        /* Custom Header */
        .header {
            height: 70px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent-primary);
            z-index: 1000;
            position: relative;
        }

        .brand-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, #8b5cf6, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Iframe Control */
        .main-container {
            width: 100%;
            height: calc(100vh - 70px);
            overflow: hidden;
            position: relative;
            background: #fff; /* Most study sites have white BG */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Trimming logic for hiding external headers */
            margin-top: -65px; 
            height: calc(100% + 65px);
        }

        /* Sidebar Styling */
        .sidebar {
            position: fixed;
            left: -300px;
            width: 300px;
            height: 100%;
            background: var(--bg-secondary);
            transition: 0.3s;
            z-index: 2000;
            padding: 20px;
            box-shadow: 5px 0 15px var(--shadow);
        }

        .sidebar.active { left: 0; }

        .nav-item {
            padding: 15px;
            background: var(--bg-primary);
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover { border-left: 4px solid var(--accent-primary); }

        .menu-btn { font-size: 20px; cursor: pointer; color: var(--accent-primary); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 20px;">Study Batches</h2>
        <div class="nav-item" onclick="loadBatch('https://eduvibe-nt.vercel.app')">
            <i class="fas fa-book"></i> Main Batch
        </div>
        <div class="nav-item" onclick="toggleSidebar()">
            <i class="fas fa-times"></i> Close Menu
        </div>
        <p style="position: absolute; bottom: 80px; font-size: 12px; color: #64748b;">
            Powerd by <b>DevCoderZ</b>
        </p>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
            <span class="brand-text">DevCoderZ</span>
        </div>
        <div class="live-clock" id="clock">00:00:00</div>
    </header>

    <main class="main-container">
        <iframe src="https://eduvibe-nt.vercel.app" id="mainFrame"></iframe>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function loadBatch(url) {
            document.getElementById('mainFrame').src = url;
            toggleSidebar();
        }

        // Live Clock logic
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
