<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Premium Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --accent: #8b5cf6;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-primary); color: var(--text-primary); overflow: hidden; height: 100vh; }

        /* Custom Header */
        .header {
            height: 65px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
            position: relative;
        }

        .brand-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(45deg, #a78bfa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-btn { font-size: 20px; cursor: pointer; color: var(--accent); }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -320px;
            width: 300px;
            height: 100%;
            background: var(--bg-secondary);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 30px 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }

        .nav-item {
            padding: 15px;
            background: var(--bg-primary);
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .nav-item:hover { border-color: var(--accent); background: #1e293b; }

        /* Main Viewport Logic */
        .main-container {
            width: 100%;
            height: calc(100vh - 65px);
            overflow: hidden; 
            position: relative;
            background: #fff;
        }

        iframe {
            width: 100%;
            border: none;
            /* Header Hide Logic */
            margin-top: -68px; 
            /* Footer Hide Logic: Stretch height to push credits out of container */
            height: calc(100% + 150px); 
            background: white;
        }

        /* Credits Overlay - To cover original site's footer */
        .footer-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid var(--accent);
            z-index: 10;
        }

        .footer-text { font-size: 12px; color: #94a3b8; }
        .footer-text b { color: var(--accent); }

        .live-clock {
            font-family: monospace;
            background: var(--bg-primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="font-size: 20px;">Portal Menu</h2>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer;"></i>
        </div>

        <div class="nav-item" onclick="loadBatch('https://eduvibe-nt.pages.dev/')">
            <i class="fas fa-book-reader"></i> 
            <span>Main Study Material</span>
        </div>

        <div class="nav-item" onclick="window.open('https://t.me/DevCoderz', '_blank')">
            <i class="fab fa-telegram"></i> 
            <span>Official Telegram</span>
        </div>

        <div style="position: absolute; bottom: 80px; left: 20px; font-size: 11px; color: #64748b;">
            System Status: <span style="color:var(--success)">Online</span><br>
            Powered by <b>DevCoderZ</b>
        </div>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
            <span class="brand-text">DevCoderZ</span>
        </div>
        <div class="live-clock" id="clock">00:00:00</div>
    </header>

    <main class="main-container">
        <iframe src="https://eduvibe-nt.pages.dev/" id="mainFrame"></iframe>

        <div class="footer-mask">
            <div class="footer-text">© 2026 Developed by <b>DevCoderZ</b></div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function loadBatch(url) {
            document.getElementById('mainFrame').src = url;
            toggleSidebar();
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
