<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Premium Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #8b5cf6;
            --white: #ffffff;
            --tg-blue: #24A1DE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-primary); overflow: hidden; height: 100vh; }

        /* --- Welcome Popup Style --- */
        #welcomePopup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .popup-content {
            background: var(--bg-secondary);
            width: 90%; max-width: 400px;
            padding: 30px; border-radius: 20px;
            border: 2px solid var(--accent);
            text-align: center; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .close-popup {
            position: absolute; top: 15px; right: 15px;
            font-size: 20px; color: #94a3b8; cursor: pointer;
        }
        .popup-icon { font-size: 50px; color: var(--accent); margin-bottom: 15px; }
        .popup-title { font-size: 24px; font-weight: 800; color: var(--white); margin-bottom: 10px; }
        .popup-benefits { text-align: left; margin: 20px 0; color: #cbd5e1; font-size: 14px; }
        .benefit-item { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .benefit-item i { color: #10b981; }

        .popup-btn {
            display: block; width: 100%; padding: 12px;
            background: var(--tg-blue); color: white;
            text-decoration: none; border-radius: 10px;
            font-weight: 600; margin-bottom: 10px;
        }
        .skip-btn { color: #94a3b8; font-size: 12px; cursor: pointer; text-decoration: underline; }

        /* --- Main UI Styles --- */
        .header {
            height: 60px; background: var(--bg-secondary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-bottom: 2px solid var(--accent);
            z-index: 1000; position: relative;
        }
        .brand-text {
            font-size: 20px; font-weight: 800;
            background: linear-gradient(45deg, #a78bfa, #34d399);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .live-timer { font-family: 'Courier New', monospace; font-size: 16px; color: var(--white); }

        .main-container { width: 100%; height: calc(100vh - 60px); overflow: hidden; position: relative; background: #fff; }
        iframe { width: 100%; border: none; margin-top: -68px; height: calc(100% + 500px); display: block; }

        .footer-mask {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 55px;
            background: var(--bg-secondary); display: flex; align-items: center;
            justify-content: center; border-top: 2px solid var(--accent); z-index: 999;
        }
        .footer-text { font-size: 13px; color: #cbd5e1; font-weight: 600; }

        .sidebar {
            position: fixed; left: -320px; width: 280px; height: 100%;
            background: var(--bg-secondary); transition: 0.3s;
            z-index: 2000; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .nav-item {
            padding: 14px; background: var(--bg-primary); margin-bottom: 12px;
            border-radius: 10px; cursor: pointer; display: flex; align-items: center;
            gap: 12px; color: white; text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="welcomePopup">
        <div class="popup-content">
            <i class="fas fa-times close-popup" onclick="closePopup()"></i>
            <div class="popup-icon"><i class="fas fa-rocket"></i></div>
            <div class="popup-title">Welcome to DevCoderZ</div>
            <p style="color: #94a3b8; font-size: 13px;">Experience the most powerful study portal</p>
            
            <div class="popup-benefits">
                <div class="benefit-item"><i class="fas fa-check-circle"></i> No Header/Footer Ads</div>
                <div class="benefit-item"><i class="fas fa-check-circle"></i> Fast & Lag-Free Interface</div>
                <div class="benefit-item"><i class="fas fa-check-circle"></i> Premium Content Access</div>
                <div class="benefit-item"><i class="fas fa-check-circle"></i> Live 24/7 Support</div>
            </div>

            <a href="https://t.me/+8tZSJ5FyTXVjM2M1" target="_blank" class="popup-btn">
                <i class="fab fa-telegram-plane"></i> Join Telegram Channel
            </a>
            <div class="skip-btn" onclick="closePopup()">Skip to Portal</div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom:25px; color:var(--accent);">DevCoderZ Portal</h3>
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</div>
        <a href="https://t.me/+8tZSJ5FyTXVjM2M1" target="_blank" class="nav-item" style="color:var(--tg-blue);">
            <i class="fab fa-telegram-plane"></i> Telegram Channel
        </a>
        <div class="nav-item" onclick="toggleSidebar()" style="margin-top:20px; color:#ef4444;"><i class="fas fa-times"></i> Close</div>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-bars" style="color:var(--accent); cursor:pointer; font-size:20px;" onclick="toggleSidebar()"></i>
            <span class="brand-text">DevCoderZ</span>
        </div>
        <div class="live-timer" id="clock">00:00:00</div>
    </header>

    <main class="main-container">
        <iframe src="https://eduvibe-nt.pages.dev/" id="mainFrame"></iframe>
        <div class="footer-mask">
            <div class="footer-text">© 2026 Developed by <b>DevCoderZ</b></div>
        </div>
    </main>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function closePopup() { document.getElementById('welcomePopup').style.display = 'none'; }

        // Live Clock
        setInterval(() => {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0'+m : m;
            s = s < 10 ? '0'+s : s;
            document.getElementById('clock').innerText = `${h}:${m}:${s} ${ampm}`;
        }, 1000);
    </script>
</body>
</html>
