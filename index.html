<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCoderZ | Premium Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --accent: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-primary); color: var(--text-primary); overflow: hidden; height: 100vh; }

        .header {
            height: 65px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
            position: relative;
        }

        .brand-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(45deg, #a78bfa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar {
            position: fixed;
            left: -320px;
            width: 300px;
            height: 100%;
            background: var(--bg-secondary);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 30px 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }

        .nav-item {
            padding: 15px;
            background: var(--bg-primary);
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }

        /* --- IFRAME TRIMMING LOGIC --- */
        .main-container {
            width: 100%;
            height: calc(100vh - 65px);
            overflow: hidden; /* Bahar ka sab cut jayega */
            position: relative;
            background: #fff;
        }

        iframe {
            width: 100%;
            border: none;
            margin-top: -68px; /* Header gayab */
            
            /* Footer ko kaatne ke liye height adjust ki hai */
            /* -250px karne se niche ka bada footer screen ke bahar chala jayega */
            height: calc(100% + 68px); 
            
            /* Scrolling smooth rakhne ke liye */
            overflow-y: auto;
        }

        /* Bottom Guard - Ye original credits ko block karega */
        .footer-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px; /* Thoda bada mask */
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid var(--accent);
            z-index: 100;
        }

        .footer-text { font-size: 13px; color: #cbd5e1; font-weight: 600; }
        .footer-text b { color: var(--accent); }

        .live-clock {
            font-family: monospace;
            background: var(--bg-primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom:20px;">DevCoderZ Menu</h2>
        <div class="nav-item" onclick="loadBatch('https://eduvibe-nt.pages.dev/')">
            <i class="fas fa-play"></i> <span>Refresh Content</span>
        </div>
        <div class="nav-item" onclick="toggleSidebar()">
            <i class="fas fa-times"></i> <span>Close</span>
        </div>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-bars" style="color:var(--accent); cursor:pointer;" onclick="toggleSidebar()"></i>
            <span class="brand-text">DevCoderZ</span>
        </div>
        <div class="live-clock" id="clock">00:00:00</div>
    </header>

    <main class="main-container">
        <iframe src="https://eduvibe-nt.pages.dev/" id="mainFrame"></iframe>

        <div class="footer-mask">
            <div class="footer-text">Powered by <b>DevCoderZ Engine</b></div>
        </div>
    </main>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function loadBatch(url) { document.getElementById('mainFrame').src = url; toggleSidebar(); }
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
